<div class="team-wrapper">
    <div class="team-stats-grid">
        <div class="team-stat-card">
            <small>Total Members</small>
            <b id="statTeamCount">0</b>
        </div>
        <div class="team-stat-card">
            <small>Online Now</small>
            <b id="statOnlineCount" class="status-online">0</b>
        </div>
        <div class="team-stat-card">
            <small>Pending Leaves</small>
            <b id="statPendingLeaves">0</b>
        </div>
    </div>

    <div class="org-toolbar-container">
        <div class="search-wrapper">
            <i class="fas fa-search"></i>
            <input type="text" id="orgSearchInput" placeholder="Search by name, role, or department...">
        </div>
        <div class="action-buttons">
            <button class="btn-outline" onclick="window.teamActions.expandAll()">Expand All</button>
            <button class="btn-outline" onclick="window.teamActions.collapseAll()">Collapse All</button>
        </div>
    </div>

    <div class="chart-card">
        <div id="orgTreeContainer">
            <div class="text-center py-5">Loading organizational chart...</div>
        </div>
    </div>
</div>
