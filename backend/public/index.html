<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HRMS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- ================= SPA BASE ================= -->
  <base href="/" />

  <!-- ================= CHARTS ================= -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>

  <!-- ================= BOOTSTRAP ================= -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
    rel="stylesheet"
  />

  <!-- ================= LEAFLET ================= -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <!-- ================= GLOBAL STYLES ================= -->
  <link rel="stylesheet" href="/assets/css/style.css" />
  <link rel="stylesheet" href="/assets/css/sidebar.css" />

  <!-- ================= BASE LAYOUT ================= -->
  <style>
    body {
      background: #f4f6f9;
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto;
    }

    .sidebar {
      width: 240px;
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      background: #1f2937;
      color: #fff;
      z-index: 1000;
    }

    .sidebar h5 {
      padding: 16px;
      border-bottom: 1px solid #374151;
      margin: 0;
    }

    .sidebar a {
      padding: 12px 16px;
      color: #d1d5db;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sidebar a:hover,
    .sidebar a.active {
      background: #111827;
      color: #fff;
    }

    .main {
      margin-left: 240px;
      min-height: 100vh;
    }

    .topbar {
      background: #2563eb;
      color: #fff;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 900;
    }
  </style>
</head>

<body>

<!-- ================= SIDEBAR ================= -->
<div class="sidebar">
  <h5 class="sidebar-brand">
    <i class="bi bi-building"></i>
    <span class="brand-text">LovasIT HRMS</span>
  </h5>

  <a href="#/home" data-route="home" data-title="Home">
    <i class="bi bi-house"></i><span>Home</span>
  </a>

  <a href="#/me" data-route="me" data-title="Me">
    <i class="bi bi-person"></i><span>Me</span>
  </a>

  <a href="#/team" data-route="team" data-title="My Team">
    <i class="bi bi-people"></i><span>My Team</span>
  </a>

  <a href="#/attendance" data-route="attendance" data-title="Attendance">
    <i class="bi bi-clock"></i><span>Attendance</span>
  </a>

  <a href="#/timesheets" data-route="timesheets" data-title="Time Management">
    <i class="bi bi-clock-history"></i><span>Time Management</span>
  </a>

  <a href="#/leaves" data-route="leaves" data-title="Leaves">
    <i class="bi bi-calendar-event"></i><span>Leaves</span>
  </a>

  <a href="#/payroll" data-route="payroll" data-title="Payroll">
    <i class="bi bi-receipt"></i><span>Payroll</span>
  </a>

  <a href="#/analytics" data-route="analytics" data-title="Analytics">
    <i class="bi bi-bar-chart"></i><span>Analytics</span>
  </a>

  <a href="#/manage-users" data-route="manage-users" data-title="Manage Users">
    <i class="bi bi-people-fill"></i><span>Manage Users</span>
  </a>
</div>

<!-- ================= MAIN ================= -->
<div class="main">

  <!-- ================= TOP BAR ================= -->
  <div class="topbar">
    <button
      id="sidebarToggle"
      class="btn btn-link text-white p-0 sidebar-toggle"
      style="font-size: 1.5rem;"
      aria-label="Toggle sidebar"
    >
      <i class="bi bi-list"></i>
    </button>

    <input
      id="globalSearch"
      class="form-control w-50"
      placeholder="Search"
      aria-label="Global search"
    />

    <div class="ms-auto d-flex align-items-center gap-3">

      <!-- Notifications -->
      <div class="dropdown">
        <button
          id="notificationToggle"
          class="btn btn-link position-relative dropdown-toggle text-white"
          type="button"
          data-bs-toggle="dropdown"
          aria-label="Notifications"
        >
          <i id="notificationBell" class="bi bi-bell-fill"></i>
          <span
            id="notificationBadge"
            class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none"
          >0</span>
        </button>

        <div class="dropdown-menu dropdown-menu-end p-3" style="width:320px;">
          <h6 class="dropdown-header">Notifications</h6>
          <div id="notificationList">
            <small class="text-muted">Loading…</small>
          </div>
        </div>
      </div>

      <!-- User -->
      <div class="dropdown">
        <span
          id="userName"
          class="fw-semibold dropdown-toggle"
          data-bs-toggle="dropdown"
          style="cursor:pointer"
        >User</span>

        <ul class="dropdown-menu dropdown-menu-end">
          <li class="dropdown-header fw-bold" id="profileName">User</li>
          <li class="dropdown-header text-muted" id="profileRole">ROLE</li>
          <li><hr class="dropdown-divider"></li>
          <li>
            <a class="dropdown-item" href="#/me">
              <i class="bi bi-person me-2"></i>My Profile
            </a>
          </li>
          <li>
            <a
              class="dropdown-item text-danger"
              href="#"
              data-action="logout"
            >
              <i class="bi bi-box-arrow-right me-2"></i>Logout
            </a>
          </li>
        </ul>
      </div>

    </div>
  </div>

  <!-- ================= SPA CONTENT ================= -->
  <div id="page-content" class="container-fluid mt-4" data-spa-root></div>
</div>

<!-- ================= TOAST CONTAINER ================= -->
<div class="toast-container" id="toastContainer"></div>

<!-- ================= JS LOAD ORDER ================= -->

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>

<script src="/assets/js/api.js" defer></script>
<script src="/assets/js/auth.js" defer></script>

<script src="/assets/js/core/spa-page.js" defer></script>
<script src="/assets/js/core/permissions.js" defer></script>

<script src="/assets/js/ui/modal.js" defer></script>
<script src="/assets/js/ui/toast.js" defer></script>

<!-- FIXED ORDER -->
<script src="/assets/js/websocket.js" defer></script>
<script src="/assets/js/notifications.js" defer></script>
<script src="/assets/js/router.js" defer></script>
<script src="/assets/js/sidebar.js" defer></script>

</body>
</html>
